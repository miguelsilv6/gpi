services:
  postgres:
    image: postgres:16-alpine
    container_name: gpi_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        GIT_SHA: ${GIT_SHA:-dev}
    container_name: gpi_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Fuso horário de TODO o processamento/formatacão de datas da app —
      # sem isto o container corre em UTC e as horas aparecem desfasadas.
      TZ: ${TZ:-Europe/Lisbon}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      SEED_PASSWORD: ${SEED_PASSWORD:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-GPI Sistema}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@gpi.local}
      CRON_SECRET: ${CRON_SECRET}
      GITHUB_REPO: ${GITHUB_REPO:-miguelsilv6/gestao-projetos}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
    ports:
      - '0.0.0.0:${HOST_PORT:-3000}:3000'
    volumes:
      - ./backups:/app/backups
      # Canal de controlo partilhado com o host daemon de auto-update.
      # O API escreve update.request.json aqui; o daemon escreve update.status.json.
      - ./control:/app/control
      # Branding: logos e favicon enviados pelo admin via /configurações.
      # Persiste através de updates da app — não é necessário no worker.
      - ./branding:/app/branding
      # Anexos de inquéritos (documentos) — persiste entre updates.
      - ./documentos:/app/documentos
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        GIT_SHA: ${GIT_SHA:-dev}
    container_name: gpi_worker
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Fuso horário de TODO o processamento/formatacão de datas da app —
      # sem isto o container corre em UTC e as horas aparecem desfasadas.
      TZ: ${TZ:-Europe/Lisbon}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-GPI Sistema}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@gpi.local}
      CRON_SECRET: ${CRON_SECRET}
      GITHUB_REPO: ${GITHUB_REPO:-miguelsilv6/gestao-projetos}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - ./backups:/app/backups
      - ./control:/app/control
    restart: unless-stopped

  # LLM local (explicações por IA na Toolbox). CPU-only; o modelo é
  # descarregado pelo admin via /configurações → Toolbox → "Descarregar modelo"
  # e persiste em ./ollama entre updates. Sem ports: só a rede interna.
  ollama:
    image: ollama/ollama:0.30.7
    container_name: gpi_ollama
    environment:
      # Liberta a RAM do modelo após 5 min sem pedidos.
      OLLAMA_KEEP_ALIVE: 5m
    volumes:
      - ./ollama:/root/.ollama
    restart: unless-stopped

volumes:
  postgres_data:
