services:
  postgres:
    image: postgres:16-alpine
    container_name: gpi_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: gpi_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      SEED_PASSWORD: ${SEED_PASSWORD:-Admin123!}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-GPI Sistema}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@gpi.local}
      CRON_SECRET: ${CRON_SECRET}
    # Bind to 127.0.0.1 only by default so the app is not exposed to the LAN.
    # Override HOST_PORT in .env if 3000 is taken locally.
    ports:
      - '127.0.0.1:${HOST_PORT:-3000}:3000'
    volumes:
      - ./backups:/app/backups
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: gpi_worker
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-GPI Sistema}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@gpi.local}
      CRON_SECRET: ${CRON_SECRET}
    volumes:
      - ./backups:/app/backups
    restart: unless-stopped

volumes:
  postgres_data:
