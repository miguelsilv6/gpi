version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gpi_postgres
    environment:
      POSTGRES_USER: gpi_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gpi_password}
      POSTGRES_DB: gpi_db
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gpi_user -d gpi_db']
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: gpi_mailhog
    ports:
      - '127.0.0.1:1025:1025'
      - '127.0.0.1:8025:8025'

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gpi_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Fuso horário de TODO o processamento/formatacão de datas da app —
      # sem isto o container corre em UTC e as horas aparecem desfasadas.
      TZ: ${TZ:-Europe/Lisbon}
      DATABASE_URL: postgresql://gpi_user:${POSTGRES_PASSWORD:-gpi_password}@postgres:5432/gpi_db
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_SECURE: 'false'
      SMTP_USER: ''
      SMTP_PASS: ''
      SMTP_FROM_NAME: 'GPI Sistema'
      SMTP_FROM_EMAIL: 'noreply@gpi.pt'
      CRON_SECRET: ${CRON_SECRET}
      GITHUB_REPO: ${GITHUB_REPO:-miguelsilv6/gestao-projetos}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
    ports:
      - '3000:3000'
    volumes:
      - ./backups:/app/backups
      # Anexos dos inquéritos (provas, relatórios, ofícios).
      - ./documentos:/app/documentos
      # Canal de controlo partilhado com o worker (e com o host daemon em prod).
      # O API escreve update.request.json; o worker lê update.status.json.
      - ./control:/app/control

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: gpi_worker
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Fuso horário de TODO o processamento/formatacão de datas da app —
      # sem isto o container corre em UTC e as horas aparecem desfasadas.
      TZ: ${TZ:-Europe/Lisbon}
      DATABASE_URL: postgresql://gpi_user:${POSTGRES_PASSWORD:-gpi_password}@postgres:5432/gpi_db
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_SECURE: 'false'
      SMTP_USER: ''
      SMTP_PASS: ''
      SMTP_FROM_NAME: 'GPI Sistema'
      SMTP_FROM_EMAIL: 'noreply@gpi.pt'
      CRON_SECRET: ${CRON_SECRET}
      GITHUB_REPO: ${GITHUB_REPO:-miguelsilv6/gestao-projetos}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - ./backups:/app/backups
      - ./control:/app/control

  # LLM local para as explicações por IA da Toolbox (ver docker-compose.prod.yml).
  ollama:
    image: ollama/ollama:latest
    container_name: gpi_ollama
    environment:
      OLLAMA_KEEP_ALIVE: 5m
    volumes:
      - ./ollama:/root/.ollama

volumes:
  postgres_data:
