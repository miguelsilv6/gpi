name: E2E

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Mínimo necessário: o job só lê o repositório (checkout). O upload do
# relatório usa o runtime de Actions, que não exige permissões extra no token.
permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gpi_user
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: gpi_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gpi_user -d gpi_test_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://gpi_user:ci_test_password@localhost:5432/gpi_test_db?schema=public
      NEXTAUTH_SECRET: ci-only-secret-not-real-do-not-use-elsewhere
      NEXTAUTH_URL: http://127.0.0.1:3000
      AUTH_TRUST_HOST: 'true'
      NEXT_TELEMETRY_DISABLED: '1'
      # Credenciais do administrador para o login E2E (BD efémera do CI).
      SEED_PASSWORD: 'E2ePassw0rd!seed'
      E2E_ADMIN_PASSWORD: 'E2ePassw0rd!seed'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply schema to test DB
        run: npx prisma db push --accept-data-loss

      - name: Seed database (admin + catálogos)
        run: npm run seed

      - name: Build
        run: npm run build

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
