name: Release

# Cria uma GitHub Release quando alguém faz bump MANUAL da versão em
# package.json num PR e o merge para main acontece.
#
# NOTA: o fluxo automático (merge normal sem bump manual) é tratado por
# auto-version.yml, que faz o bump e cria a release no mesmo job.
# Este workflow NÃO é acionado pelo commit de bump do auto-version.yml
# porque esse commit usa GITHUB_TOKEN (o GitHub não dispara workflows
# a partir de pushes com GITHUB_TOKEN para evitar loops).
#
# Se a versão não mudou (tag já existe), não faz nada — idempotente.

on:
  push:
    branches: [main]

# Ignora commits do auto-bump para evitar duplicados (o auto-version.yml
# já criou a release no mesmo job que fez o bump).


permissions:
  contents: write

jobs:
  release:
    name: Tag + GitHub Release on version bump
    runs-on: ubuntu-latest
    # O auto-version.yml já cria a release para os seus próprios bumps.
    # Esta guard é defensiva — o push de chore(version): usa GITHUB_TOKEN e
    # não dispara este workflow de qualquer forma.
    if: "!startsWith(github.event.head_commit.message, 'chore(version):')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ler versão do package.json
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Verificar se a tag já existe
        id: check
        run: |
          if git rev-parse "v${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.ver.outputs.version }} já existe — sem release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Criar GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            --title "v${{ steps.ver.outputs.version }}" \
            --generate-notes
